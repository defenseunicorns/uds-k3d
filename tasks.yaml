includes:
  - actions: https://raw.githubusercontent.com/defenseunicorns/uds-common/refs/tags/v1.24.13/tasks/actions.yaml
  - lint: https://raw.githubusercontent.com/defenseunicorns/uds-common/refs/tags/v1.24.13/tasks/lint.yaml

variables:
  - name: VERSION
    # renovate: datasource=docker depName=rancher/k3s versioning=semver
    default: v1.35.5-k3s1
  - name: IMAGE_NAME
    default: ghcr.io/defenseunicorns/uds-k3d/k3s
  - name: K3D_EXTRA_ARGS
    default: ""
  - name: NGINX_EXTRA_PORTS
    default: "[]"
  - name: ARCH
    default: ${UDS_ARCH}
  - name: K3D_NETWORK
    default: ""

tasks:
  - name: default
    description: Runs a full build, deploy, and test of the package
    actions:
      - task: build
      - task: deploy
      - task: validate

  - name: default-airgap
    description: Runs a full build, deploy, and test of the airgap package
    actions:
      - task: build-airgap-package
      - task: deploy-airgap-package
      - task: validate # Note: for local usage this pulls zarf init

  - name: build-image
    description: Build the custom k3s image with glibc support for FIPS CNI compatibility
    actions:
      - description: Build custom k3s image
        cmd: |
          docker build \
            --platform "linux/${ARCH}" \
            --build-arg "K3S_TAG=${VERSION}" \
            --tag "${IMAGE_NAME}:${VERSION}" \
            docker/

  - name: publish-image
    description: Publish the custom k3s image (multi-platform) to the registry
    actions:
      - description: Publish custom k3s image
        cmd: |
          docker buildx build --push \
            --platform linux/amd64,linux/arm64 \
            --build-arg "K3S_TAG=${VERSION}" \
            --tag "${IMAGE_NAME}:${VERSION}" \
            docker/

  - name: build
    description: Build uds-k3d
    actions:
      - description: Build UDS K3d package
        cmd: uds zarf package create -a "${ARCH}" --confirm --skip-sbom

  - name: deploy
    description: Deploy uds-k3d package
    actions:
      - description: Deploy UDS K3d package
        cmd: |
          uds zarf package deploy zarf-package-uds-k3d-"${ARCH}"-*.tar.zst \
            --set K3D_IMAGE="${IMAGE_NAME}:${VERSION}" \
            --set K3D_EXTRA_ARGS="${K3D_EXTRA_ARGS}" \
            --set NGINX_EXTRA_PORTS="${NGINX_EXTRA_PORTS}" \
            --confirm

  - name: validate
    actions:
      - task: validate-coredns
      - task: validate-metallb
      - cmd: uds zarf tools download-init
        description: Download the zarf init package
      - task: validate-zarf-init

  - name: validate-airgap
    actions:
      - task: validate-coredns
      - task: validate-metallb
      - task: validate-zarf-init

  - name: validate-metallb
    actions:
      - description: Validate metallb-controller is up
        wait:
          cluster:
            kind: Pod
            name: app.kubernetes.io/component=controller
            namespace: kube-system
            condition: Ready
      - description: Validate metallb-speaker is up
        wait:
          cluster:
            kind: Pod
            name: app.kubernetes.io/component=speaker
            namespace: kube-system
            condition: Ready
      - description: Validate metallb-frr-k8s is up
        wait:
          cluster:
            kind: Pod
            name: app.kubernetes.io/component=frr-k8s
            namespace: kube-system
            condition: Ready
      - description: Validate metallb-frr-k8s-statuscleaner is up
        wait:
          cluster:
            kind: Pod
            name: app.kubernetes.io/component=statuscleaner
            namespace: kube-system
            condition: Ready

  - name: validate-coredns
    actions:
      - description: Validate coredns is up
        wait:
          cluster:
            kind: Pod
            name: k8s-app=kube-dns
            namespace: kube-system
            condition: Ready
      - description: Validate coredns is resolving *.uds.dev internally
        cmd: |
          set -e
          # renovate: datasource=docker depName=quay.io/nginx/nginx-unprivileged versioning=docker
          FOO_IP=$(kubectl run test --image=quay.io/nginx/nginx-unprivileged:1.31.2-alpine -q --restart=Never --rm -i -- sh -c "getent hosts foo.uds.dev | awk '{print \$1}'")
          if [ "${FOO_IP}" != "127.0.0.1" ]; then
            echo "CoreDNS is resolving foo.uds.dev to host.k3d.internal"
          else
            echo "CoreDNS patch failed, foo.uds.dev is resolving to 127.0.0.1"
            exit 1
          fi

  - name: validate-zarf-init
    actions:
      - description: Validate zarf init
        cmd: |
          set -e
          # Test zarf init due to containerd issue - https://github.com/defenseunicorns/zarf/issues/592
          uds zarf init --confirm

  - name: build-airgap-package
    actions:
      - description: Build the airgap package
        cmd: |
          uds zarf package create -a "${ARCH}" --flavor airgap --confirm \
            --set K3S_VERSION="${VERSION}" --skip-sbom

      - description: Clean up airgap images
        task: clean-airgap-images

  - name: deploy-airgap-package
    actions:
      - description: Deploy the airgap package
        cmd: |
          uds zarf package deploy zarf-package-uds-k3d-"${ARCH}"-*-airgap.tar.zst \
            --set K3D_NETWORK="${K3D_NETWORK}" \
            --confirm

  - name: clean-airgap-images
    actions:
      - description: Remove airgap images
        cmd: |
          rm airgap/uds-dev-stack/*.tar
          rm airgap/k3d/*.tar
          rm airgap/k3d/*.tar.zst
