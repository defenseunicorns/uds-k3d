name: Test UDS Airgap Capability

on:
  pull_request:
    # milestoned is added here as a workaround for release-please not triggering PR workflows (PRs should be added to a milestone to trigger the workflow).
    types: [milestoned, opened, reopened, synchronize]
    paths-ignore:
      - "**.md"
      - "**.jpg"
      - "**.png"
      - "**.gif"
      - "**.svg"
      - docs/**
      - .vscode/**
      - .gitignore
      - renovate.json
      - .codespellrc
      - .release-please-config.json
      - release-please-config.json
      - CODEOWNERS
      - LICENSE
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  build-package:
    name: Build Airgap Package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        architecture: [amd64, arm64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install UDS CLI
        uses: defenseunicorns/setup-uds@ab842abcad1f7a3305c2538e3dd1950d0daacfa5 # v1.0.1
        with:
          # renovate: datasource=github-tags depName=defenseunicorns/uds-cli versioning=semver
          version: v0.32.0

      - name: Environment setup
        run: |
            echo "MARU_AUTH=\"{\"raw.githubusercontent.com\": \"${{ secrets.GITHUB_TOKEN }}\"}\"" >> "$GITHUB_ENV"
            uds run actions:setup-environment \
            --set GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
        shell: bash

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Create the airgap package
        run: uds run build-airgap-package --set ARCH=${{ matrix.architecture }}

      - name: Upload Airgap Package Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: airgap-package-${{ matrix.architecture }}
          path: ./zarf-package-uds-k3d-*.tar.zst
          retention-days: 1

  deploy-airgap:
    name: Deploy Airgap Package
    runs-on: ${{ matrix.architecture == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    needs: build-package # This job depends on the build-package job completing successfully
    strategy:
      matrix:
        architecture: [amd64, arm64]

    steps:
      - name: Harden Runner - Block Egress
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com
            objects.githubusercontent.com
            api.github.com
            release-assets.github.com
            raw.githubusercontent.com

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download Airgap Package Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: airgap-package-${{ matrix.architecture }}
          path: .

      - name: Install UDS CLI
        uses: defenseunicorns/setup-uds@ab842abcad1f7a3305c2538e3dd1950d0daacfa5 # v1.0.1
        with:
          # renovate: datasource=github-tags depName=defenseunicorns/uds-cli versioning=semver
          version: v0.32.0

      - name: Download Zarf Init Package
        run: |
          ZARF_VERSION=$(uds zarf version)
          curl -L https://github.com/zarf-dev/zarf/releases/download/${ZARF_VERSION}/zarf-init-${{ matrix.architecture }}-${ZARF_VERSION}.tar.zst -o zarf-init-${{ matrix.architecture }}-${ZARF_VERSION}.tar.zst

      - name: Install deps
        run: |
          uds run actions:install-deps
        shell: bash

      - name: Isolate the cluster network
        run: |
          set -euo pipefail
          SUBNET=172.28.0.0/16
          docker network create --subnet "${SUBNET}" "${K3D_NETWORK}"
          sudo iptables -I DOCKER-USER -s "${SUBNET}" -j DROP
          sudo iptables -I DOCKER-USER -s "${SUBNET}" -d 192.168.0.0/16 -j ACCEPT
          sudo iptables -I DOCKER-USER -s "${SUBNET}" -d 172.16.0.0/12 -j ACCEPT
          sudo iptables -I DOCKER-USER -s "${SUBNET}" -d 10.0.0.0/8 -j ACCEPT
          sudo iptables -I DOCKER-USER -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
          echo "DOCKER-USER chain (top rules evaluated first):"
          sudo iptables -L DOCKER-USER -n --line-numbers
        env:
          K3D_NETWORK: uds-airgap
        shell: bash

      - name: Deploy the airgap package
        run: uds run deploy-airgap-package --no-progress
        env:
          K3D_NETWORK: uds-airgap
        shell: bash

      - name: Validate uds-k3d package
        run: |
          uds run validate-airgap --no-progress
        shell: bash

      - name: Debug Output
        if: ${{ always() }}
        uses: ./.github/actions/debug-output
