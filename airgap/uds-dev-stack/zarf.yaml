kind: ZarfPackageConfig
metadata:
  name: uds-dev-stack-airgap-images
  yolo: true
  description: >
    *** REQUIRES DOCKER ***
    Loads the required images for UDS Dev Stack into Docker to be used offline.

constants:
  - name: LOCAL_PATH_PROVISIONER_VERSION
    value: "v0.0.31"
  - name: BUSYBOX_VERSION
    value: "latest"
  - name: WOLFI_BASE_VERSION
    value: "latest"
  - name: PAUSE_VERSION
    value: "3.10"
  - name: NGINX_VERSION
    value: "1.28.0-alpine3.21"
  - name: METALLB_CONTROLLER_VERSION
    value: "v0.14.9"
  - name: METALLB_SPEAKER_VERSION
    value: "v0.14.9"
  - name: FRR_VERSION
    value: "9.1.0"
  - name: MINIO_VERSION
    value: "RELEASE.2025-04-03T14-56-28Z"
  - name: MINIO_MC_VERSION
    value: "RELEASE.2024-11-21T17-21-54Z"

components:
  - name: uds-dev-stack-airgap-images
    files:
      - source: local-path-provisioner.tar
        target: local-path-provisioner.tar
      - source: busybox.tar
        target: busybox.tar
      - source: wolfi-base.tar
        target: wolfi-base.tar
      - source: pause.tar
        target: pause.tar
      - source: nginx.tar
        target: nginx.tar
      - source: metallb-controller.tar
        target: metallb-controller.tar
      - source: metallb-speaker.tar
        target: metallb-speaker.tar
      - source: frr.tar
        target: frr.tar
      - source: minio.tar
        target: minio.tar
      - source: minio-mc.tar
        target: minio-mc.tar
    actions:
      onCreate:
        before:
          - cmd: |
              ./zarf tools registry pull --platform linux/"###ZARF_PKG_ARCH###" rancher/local-path-provisioner:${LOCAL_PATH_PROVISIONER_VERSION} local-path-provisioner.tar
              ./zarf tools registry pull --platform linux/"###ZARF_PKG_ARCH###" cgr.dev/chainguard/busybox:${BUSYBOX_VERSION} busybox.tar
              ./zarf tools registry pull --platform linux/"###ZARF_PKG_ARCH###" cgr.dev/chainguard/wolfi-base:${WOLFI_BASE_VERSION} wolfi-base.tar
              ./zarf tools registry pull --platform linux/"###ZARF_PKG_ARCH###" registry.k8s.io/pause:${PAUSE_VERSION} pause.tar
              ./zarf tools registry pull --platform linux/"###ZARF_PKG_ARCH###" quay.io/nginx/nginx-unprivileged:${NGINX_VERSION} nginx.tar
              ./zarf tools registry pull --platform linux/"###ZARF_PKG_ARCH###" quay.io/metallb/controller:${METALLB_CONTROLLER_VERSION} metallb-controller.tar
              ./zarf tools registry pull --platform linux/"###ZARF_PKG_ARCH###" quay.io/metallb/speaker:${METALLB_SPEAKER_VERSION} metallb-speaker.tar
              ./zarf tools registry pull --platform linux/"###ZARF_PKG_ARCH###" quay.io/frrouting/frr:${FRR_VERSION} frr.tar
              ./zarf tools registry pull --platform linux/"###ZARF_PKG_ARCH###" quay.io/minio/minio:${MINIO_VERSION} minio.tar
              ./zarf tools registry pull --platform linux/"###ZARF_PKG_ARCH###" quay.io/minio/mc:${MINIO_MC_VERSION} minio-mc.tar
            description: Pull the airgap images for uds-dev-stack
      onDeploy:
        after:
          - cmd: |
              k3d image load local-path-provisioner.tar \
                busybox.tar \
                wolfi-base.tar \
                pause.tar \
                nginx.tar \
                metallb-controller.tar \
                metallb-speaker.tar \
                minio.tar \
                minio-mc.tar \
                frr.tar \
                -c ${ZARF_VAR_CLUSTER_NAME}
            description: Load the airgap images for uds-dev-stack into Docker
          - cmd: rm pause.tar nginx.tar wolfi-base.tar busybox.tar local-path-provisioner.tar metallb-controller.tar metallb-speaker.tar minio.tar minio-mc.tar frr.tar
            description: Cleanup the airgap image tars
