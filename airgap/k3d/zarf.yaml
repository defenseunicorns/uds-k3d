kind: ZarfPackageConfig
metadata:
  name: k3d-airgap-images
  yolo: true
  description: >
    *** REQUIRES DOCKER ***
    Loads the required images for K3d into Docker to be used offline.

components:
  - name: k3d-airgap-images
    files:
      # Transfer the K3d images for docker to use in the air gap
      # k3d proxy ARM and AMD
      - source: k3d-proxy-amd64.tar
        shasum: e8d847902aa318fb6a3432150e58f55ed27076a7cf5511cc2cf7a4924708c074
        target: k3d-proxy-amd64.tar

      - source: k3d-proxy-arm64.tar
        shasum: f8fc3a88fb4e7846fda42f647c2a9fa70ecae1fe7e8584d2d6be7749ac632af9
        target: k3d-proxy-arm64.tar

      # k3d tools ARM and AMD
      - source: k3d-tools-amd64.tar
        shasum: 51249a799534a762ec26f159fa4fa4a73e576e0626472dd44e4fe41e3004d9fd
        target: k3d-tools-amd64.tar

      - source: k3d-tools-arm64.tar
        shasum: b290184eda65fa55d26e7a896190fb598e0b7fa11a15cf9e32ff917bc041c76c
        target: k3d-tools-arm64.tar
    actions:
      onCreate:
        before:
          - cmd: ./zarf tools registry pull --platform linux/amd64 ghcr.io/k3d-io/k3d-proxy:5.8.3 k3d-proxy-amd64.tar
            description: Pull the 'k3d-proxy' amd64 image
          - cmd: ./zarf tools registry pull --platform linux/arm64 ghcr.io/k3d-io/k3d-proxy:5.8.3 k3d-proxy-arm64.tar
            description: Pull the 'k3d-proxy' arm64 image
          - cmd: ./zarf tools registry pull --platform linux/amd64 ghcr.io/k3d-io/k3d-tools:5.8.3 k3d-tools-amd64.tar
            description: Pull the 'k3d-tools' amd64 image
          - cmd: ./zarf tools registry pull --platform linux/arm64 ghcr.io/k3d-io/k3d-tools:5.8.3 k3d-tools-arm64.tar
            description: Pull the 'k3d-tools' arm64 image
      onDeploy:
        after:
            - cmd: |
                if [ "${ZARF_VAR_AIRGAP_DEPLOY}" = "true" ]; then
                    echo ""
                    echo "###################################################"
                    echo "#                                                 #"
                    echo "#      BUNDLE BEING DEPLOYED IN AIRGAP MODE       #"
                    echo "#    THIS IS NOT MEANT TO BE USED IN PRODUCTION   #"
                    echo "#                                                 #"
                    echo "###################################################"
                    echo ""
                    docker image load -i k3d-proxy-"###ZARF_PKG_ARCH###".tar
                    docker image load -i k3d-tools-"###ZARF_PKG_ARCH###".tar
                    rm k3d-proxy-"###ZARF_PKG_ARCH###".tar k3d-tools-"###ZARF_PKG_ARCH###".tar
                fi
              description: Load the airgap images for k3d into Docker
      onRemove:
        before:
          - cmd: docker image rm ghcr.io/k3d-io/k3d-proxy:5.8.3 --force
            description: Remove the 'k3d-proxy' image from Docker
          - cmd: docker image rm ghcr.io/k3d-io/k3d-tools:5.8.3 --force
            description: Remove the 'k3d-tools' image from Docker
